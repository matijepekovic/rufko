name: rufko
description: "Professional roofing estimator and quote generator"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8

  # Excel Integration
  excel: ^4.0.6
  share_plus: ^7.2.2

  # PDF Generation and Parsing
  pdf: ^3.11.3
  syncfusion_flutter_pdf: ^26.2.14
  syncfusion_flutter_pdfviewer: ^26.2.14

  # File Handling
  file_picker: ^8.3.7
  open_filex: ^4.7.0
  path_provider: ^2.1.5

  # Image/Camera
  image_picker: ^1.1.2

  # Local Storage
  sqflite: ^2.4.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management & Utils
  provider: ^6.1.5
  intl: ^0.19.0
  uuid: ^4.5.1

  # HTTP & Networking
  http: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Hive code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.15

  # Icon generation
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/images/logo/
    - assets/templates/
    - assets/excel/
    - assets/icon/

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/rufko_logo_1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true